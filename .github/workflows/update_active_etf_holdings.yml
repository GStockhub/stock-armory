name: Update Active ETF Holdings

on:
  schedule:
    # 台灣時間 17:45、18:45。GitHub Actions 使用 UTC。
    - cron: "45 9 * * 1-5"
    - cron: "45 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-active-etf-holdings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Active ETF ETL
        run: |
          python active_etf_etl.py --output data/active_etf_holdings_history.csv --report data/active_etf_etl_report.json --top-n 10 --keep-days 60

      - name: Commit updated ETF holdings history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data
          if git diff --cached --quiet; then
            echo "No ETF holdings updates to commit."
          else
            git commit -m "Update active ETF holdings history"
            git push
          fi
