name: Update Active ETF Holdings

on:
  schedule:
    # 平日每日模式：台灣時間 17:45 與 18:45，只抓熱門前 15，速度較穩。
    - cron: "45 9 * * 1-5"
    - cron: "45 10 * * 1-5"
    # 每週全量模式：台灣時間週六 09:30，補抓全部主動 ETF。
    - cron: "30 1 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "ETL mode: daily=熱門前N；full=全主動ETF"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - full
      top_n:
        description: "daily 模式抓取檔數；full 模式會忽略此值並全抓"
        required: true
        default: "15"

permissions:
  contents: write

jobs:
  update-active-etf-holdings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve ETL mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            TOP_N="${{ github.event.inputs.top_n }}"
          else
            # 週六排程跑 full，其餘平日跑 daily。
            DOW=$(date -u +%u)
            if [ "$DOW" = "6" ]; then
              MODE="full"
              TOP_N="30"
            else
              MODE="daily"
              TOP_N="15"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "top_n=$TOP_N" >> "$GITHUB_OUTPUT"
          echo "Resolved mode=$MODE top_n=$TOP_N"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Active ETF layered ETL
        run: |
          # V37.10.1：daily 抓熱門前 N；full 全抓。預設不抓個股收盤價。
          python active_etf_etl.py --mode "${{ steps.mode.outputs.mode }}" --output data/active_etf_holdings_history.csv --report data/active_etf_etl_report.json --top-n "${{ steps.mode.outputs.top_n }}" --keep-days 60

      - name: Commit updated ETF holdings history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data
          if git diff --cached --quiet; then
            echo "No ETF holdings updates to commit."
          else
            git commit -m "Update active ETF holdings history"
            git push
          fi
