name: Update Active ETF Holdings

on:
  schedule:
    # 平日每日模式：台灣時間 17:45 與 18:45，只抓熱門前 10，速度較穩。
    - cron: "45 9 * * 1-5"
    - cron: "45 10 * * 1-5"
    # 每週全量攻堅：台灣時間週六 09:30，全量掃描並啟用 Playwright。
    - cron: "30 1 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "ETL mode: daily=熱門前N；full=全主動ETF攻堅"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - full
      top_n:
        description: "daily 模式抓取檔數；full 模式會忽略此值並全抓"
        required: true
        default: "10"
      use_playwright:
        description: "Playwright攻堅：auto=full啟用；true=強制；false=關閉"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - true
          - false

permissions:
  contents: write

concurrency:
  group: active-etf-holdings-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-active-etf-holdings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve ETL mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            TOP_N="${{ github.event.inputs.top_n }}"
            USE_PW="${{ github.event.inputs.use_playwright }}"
          else
            DOW=$(date -u +%u)
            if [ "$DOW" = "6" ]; then
              MODE="full"
              TOP_N="30"
              USE_PW="auto"
            else
              MODE="daily"
              TOP_N="10"
              USE_PW="auto"
            fi
          fi

          if [ "$USE_PW" = "auto" ]; then
            if [ "$MODE" = "full" ]; then
              ENABLE_PW="1"
            else
              ENABLE_PW="0"
            fi
          elif [ "$USE_PW" = "true" ]; then
            ENABLE_PW="1"
          else
            ENABLE_PW="0"
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "top_n=$TOP_N" >> "$GITHUB_OUTPUT"
          echo "enable_playwright=$ENABLE_PW" >> "$GITHUB_OUTPUT"
          echo "Resolved mode=$MODE top_n=$TOP_N enable_playwright=$ENABLE_PW"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.mode.outputs.enable_playwright == '1'
        run: |
          pip install playwright
          python -m playwright install chromium

      - name: Run Active ETF layered ETL
        env:
          ACTIVE_ETF_ENABLE_PLAYWRIGHT: ${{ steps.mode.outputs.enable_playwright }}
        run: |
          python active_etf_etl.py --mode "${{ steps.mode.outputs.mode }}" --output data/active_etf_holdings_history.csv --report data/active_etf_etl_report.json --scout-report data/active_etf_source_scout.json --top-n "${{ steps.mode.outputs.top_n }}" --keep-days 60

      - name: Commit updated ETF holdings history
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data
          if git diff --cached --quiet; then
            echo "No ETF holdings updates to commit."
            exit 0
          fi

          git commit -m "Update active ETF holdings history"

          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed. Abort and retry from latest remote."
              git rebase --abort || true
              git pull --rebase origin main
            }

            if git push origin HEAD:main; then
              echo "Pushed ETF holdings update."
              exit 0
            fi

            echo "Push rejected, retry $i..."
            sleep 3
          done

          echo "Failed to push after retries."
          exit 1
