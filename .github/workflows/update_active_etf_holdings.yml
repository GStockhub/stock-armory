name: Update Active ETF Holdings

on:
  schedule:
    # 平日每日模式：台灣時間 17:45 與 18:45，只抓熱門前 10，速度較穩。
    - cron: "45 9 * * 1-5"
    - cron: "45 10 * * 1-5"
    # 每週全量模式：台灣時間週六 09:30，補抓全部主動 ETF。
    - cron: "30 1 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "ETL mode: daily=熱門前N；full=全主動ETF"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - full
      top_n:
        description: "daily 模式抓取檔數；full 模式會忽略此值並全抓"
        required: true
        default: "10"

permissions:
  contents: write

concurrency:
  group: active-etf-holdings-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-active-etf-holdings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve ETL mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            TOP_N="${{ github.event.inputs.top_n }}"
          else
            # 週六排程跑 full，其餘平日跑 daily。
            DOW=$(date -u +%u)
            if [ "$DOW" = "6" ]; then
              MODE="full"
              TOP_N="30"
            else
              MODE="daily"
              TOP_N="10"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "top_n=$TOP_N" >> "$GITHUB_OUTPUT"
          echo "Resolved mode=$MODE top_n=$TOP_N"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Active ETF layered ETL
        run: |
          # V37.10：同一個 workflow 完成 registry / scout / ETL；預設不抓個股收盤價，也不在 Streamlit 前端爬資料。
          python active_etf_etl.py --mode "${{ steps.mode.outputs.mode }}" --output data/active_etf_holdings_history.csv --report data/active_etf_etl_report.json --scout-report data/active_etf_source_scout.json --top-n "${{ steps.mode.outputs.top_n }}" --keep-days 60

      - name: Commit updated ETF holdings history
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data
          if git diff --cached --quiet; then
            echo "No ETF holdings updates to commit."
            exit 0
          fi

          git commit -m "Update active ETF holdings history"

          # V37.10.2：避免 main 在 workflow 執行期間被你手動更新，導致 push 被 rejected。
          # 先把遠端 main rebase 進來，再 push；若剛好又有人更新，最多重試 3 次。
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed. Abort and retry from latest remote."
              git rebase --abort || true
              git pull --rebase origin main
            }

            if git push origin HEAD:main; then
              echo "Pushed ETF holdings update."
              exit 0
            fi

            echo "Push rejected, retry $i..."
            sleep 3
          done

          echo "Failed to push after retries."
          exit 1
